# Produção: Caddy expõe a app na rede; app e banco ficam só na rede interna
services:
  app:
    environment:
      SEED_DATABASE: ${SEED_DATABASE:-true}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${PUBLIC_HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
