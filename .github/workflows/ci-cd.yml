name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DATABASE_URL: postgresql://missvotes:test@localhost:5432/missvotes

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: missvotes
          POSTGRES_PASSWORD: test
          POSTGRES_DB: missvotes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U missvotes -d missvotes"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema
        run: npx prisma db push

      - name: Seed database
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  deploy:
    name: Deploy to VPS
    needs: ci
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy configuration
        run: |
          missing=0
          if [ -z "${{ vars.VPS_HOST }}" ]; then
            echo "::error::Missing repository variable VPS_HOST (ex: 2.25.148.38)"
            missing=1
          fi
          if [ -z "${{ vars.VPS_USER }}" ]; then
            echo "::error::Missing repository variable VPS_USER (ex: root)"
            missing=1
          fi
          if [ -z "${{ vars.VPS_SSH_KEY }}" ]; then
            echo "::error::Missing repository variable VPS_SSH_KEY (private key)"
            missing=1
          fi
          if [ -z "${{ vars.VPS_APP_PATH }}" ]; then
            echo "::error::Missing repository variable VPS_APP_PATH (ex: /opt/miss-votes)"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ vars.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ vars.VPS_APP_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker image prune -f
